<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <script src="components/components.js"></script>
    <script src="popup.js"></script>
  </head>
  <body>
    <h3>Управление чатами</h3>
    <div class="switch_container">
      <label class="switch">
        <input type="checkbox" id="toggleExtension" />
        <span class="slider"></span>
      </label>
      <span class="switch_container__title">Включить папки</span>
    </div>
    <div class="folders_actions">
      <button id="addFolderButton" class="folders_actions__add">
        + Добавить папку
      </button>
    </div>
    <div class="popup_folders"></div>
    <div id="popupToast" class="popup_toast"></div>

    <div id="popupModal" class="popup_modal" hidden>
      <div class="popup_modal__backdrop"></div>
      <div class="popup_modal__dialog">
        <h4 id="popupModalTitle" class="popup_modal__title"></h4>
        <p id="popupModalText" class="popup_modal__text"></p>

        <input
          id="popupModalInput"
          class="popup_modal__input"
          type="text"
          maxlength="30"
        />

        <div class="popup_modal__actions">
          <button
            id="popupModalCancel"
            class="popup_modal__btn popup_modal__btn--secondary"
          >
            Отмена
          </button>
          <button
            id="popupModalConfirm"
            class="popup_modal__btn popup_modal__btn--primary"
          >
            Подтвердить
          </button>
        </div>
      </div>
    </div>

    <!-- <script src="popup.js"></script> -->
  </body>
</html>
